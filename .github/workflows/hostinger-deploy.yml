name: Deploy to Hostinger FTP

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js App
        run: npm run build

      - name: Debug Secrets
        run: |
          echo "FTP_SERVER length: ${#SERVER}"
          echo "FTP_USERNAME length: ${#USERNAME}"
          echo "FTP_PASSWORD length: ${#PASSWORD}"
          if [ "${#SERVER}" -eq 0 ] || [ "${#USERNAME}" -eq 0 ] || [ "${#PASSWORD}" -eq 0 ]; then
            echo "::error::One or more FTP secrets are empty! Please ensure they are added as 'Repository secrets' (not Environment secrets)."
          fi
        env:
          SERVER: ${{ secrets.FTP_SERVER }}
          USERNAME: ${{ secrets.FTP_USERNAME }}
          PASSWORD: ${{ secrets.FTP_PASSWORD }}

      - name: Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./out/
          server-dir: ./public_html/
